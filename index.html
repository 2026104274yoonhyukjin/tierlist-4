    <!DOCTYPE html>
    <html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>4조 🎬 영화/드라마 티어 리스트</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

        <style>
            /* 1. 전체 초기화 */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Pretendard', sans-serif;
                padding: 40px 20px;
                background-color: #f4f4f5;
            }

            header {
                text-align: center;
                margin-bottom: 40px;
                margin-right: 200px;
            }

            h1 {
                font-size: 2.5rem;
                margin-bottom: 10px;
                color: #333;
                
            }

            p {
                color: #666;
                font-size: 1.1rem;
            }

            /* =========================================
           [실습 1] 메인 레이아웃 (보드와 사이드 패널 가로 배치)
           ========================================= */
            .layout-wrapper {
                max-width: 1000px;
                margin: 0 auto;

                /* TODO 1: 보드와 사이드 패널을 가로로 배치하고, 공간이 좁아지면 자연스럽게 줄바꿈되도록 설정하세요. (간격: 20px) */
                /* 💡 힌트: display, flex-wrap, gap 속성을 사용하세요. */
                display: flex; /* 가로 배치 (라벨/아이템) */
                flex-wrap: wrap; /* 유연한 줄바꿈(Wrap) */
                gap: 20px; /* (간격: 20px) */
            }

            /* 2. 티어 리스트 보드 (좌측 넓은 영역) */
            .tier-board {
                background: #1e1e1e;
                border-radius: 12px;
                border: 2px solid #333;
                overflow: hidden;
                flex-wrap: wrap;
                width: 500px;
                /* TODO 2: 남은 가로 공간을 꽉 채우도록 설정하고, 내부 행(Row)들이 세로로 쌓이도록 방향을 지정하세요. */
                /* 💡 힌트: flex-grow와 flex-direction 속성이 필요합니다. (우선 display: flex; 를 선언하는 것도 잊지 마세요!) */
                display: flex; /* 가로 배치 (라벨/아이템) */
                flex-grow: 1;  /* 잔여 공간 채우기(Grow) */
                flex-direction: column; /* 모바일 반응형(Media Query)*/
            }

            /* 3. 사이드 패널 (우측 미리보기 및 대기소 영역) */
            .side-panel {
                width: 320px;
                /* 고정 너비 */
                display: flex;
                flex-direction: column;
            }

            /* =========================================
           [실습 2] 티어 행 내부 배치
           ========================================= */
            .tier-row {
                border-bottom: 2px solid #333;
                min-height: 120px;
                flex-wrap: nowrap;
                width: 100%;
                /* TODO 3: 좌측 등급 라벨과 우측 아이템 드롭 영역을 가로로 배치하세요. */
                /* 💡 힌트: 요소를 가로로 나열하는 가장 기본적인 Flexbox 속성 1가지만 적용하면 됩니다. */
                display: flex; /* 가로 배치 (라벨/아이템) */
            }

            .tier-row:last-child {
                border-bottom: none;
            }

            /* 티어 라벨 (좌측 등급 표시) */
            .tier-label {
                width: 120px;
                font-size: 2rem;
                font-weight: bold;
                color: #333;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                /* 창이 줄어도 라벨 크기는 고정 */
            }

            .rank-s {
                background-color: #ff7f7f;
            }

            .rank-a {
                background-color: #ffbf7f;
            }

            .rank-b {
                background-color: #ffff7f;
            }

            .rank-c {
                background-color: #7fff7f;
            }

            .rank-d {
                background-color: #7fbfff;
            }

            /* =========================================
           [실습 3] 드롭 영역 및 아이템 정렬
           ========================================= */
            .tier-items,
            .item-pool {
                padding: 15px;
                gap: 10px;
                
            }

            .tier-items {
                background-color: #2b2b2b;

                /* TODO 4: 아이템들을 가로로 나열하되 넘치면 줄바꿈되도록 하고, 라벨을 제외한 남은 공간을 꽉 채우세요. */
                /* 💡 힌트: display, flex-wrap, flex-grow 세 가지 속성을 모두 조합해야 합니다. */
                display: flex; /* 가로 배치(라벨/아이템) */
                flex-wrap: wrap; /* 유연한 줄바꿈(Wrap) */
                flex-grow: 1; /* 잔여 공간 채우기(Grow) */
                
            }

            /* 아이템 대기소 */
            .item-pool {
                background-color: #e5e7eb;
                border-radius: 12px;
                min-height: 200px;
                display: flex;
                flex-wrap: wrap;
                max-height: 500px;


            }

            /* 미리보기 창 디자인 */
            .preview-box {
                background-color: #ffffff;
                border-radius: 12px;
                padding: 30px;
                margin-bottom: 30px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                text-align: center;
                min-height: 150px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .preview-box img {
                width: 170px;
                height: 230px;
                object-fit: cover;
                border-radius: 5px;
                margin-bottom: 10px;
            }

            .preview-box p {
                font-weight: bold;
                font-size: 1.2rem;
                color: #333;
            }

            .preview-placeholder {
                color: #9ca3af;
                font-size: 0.9rem;
            }

            /* 개별 아이템 디자인 */
            .item {
                width: 70px;
                height: 70px;
                cursor: grab;
                border-radius: 7px;
                overflow: hidden;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                position: relative;
                transition: transform 0.2s;
               
            }

            .item:hover {
                transform: scale(1.05);
                border: 2px solid black;
                box-shadow: 0 0 15px gold; /* 아이템 박스 그림자 효과*/
            }

            .item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
                                                                        
            .item .item-name {
                position: absolute;
                bottom: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.7);
                color: white;
                font-size: 0.7rem;
                text-align: center;
                padding: 4px 0;
                pointer-events: none;
            }

            /* 4. 반응형 레이아웃 (Media Query) */
            @media (max-width: 800px) {
                .side-panel {
                    width: 100%;
                }

                /* 모바일에서는 사이드 패널이 전체 너비 차지 */
                .tier-row {
                    /* TODO 5: 모바일 화면에서는 라벨과 드롭 영역이 세로로 배치되도록 방향을 바꾸세요. */
                    /* 💡 힌트: flex-direction 속성을 활용하여 정렬 축을 세로 방향으로 변경하세요. */
                    flex-direction: column;
                }

                .tier-label {
                    width: 100%;
                    height: 50px;
                    font-size: 1.5rem;
                }
            }
           /* 백그라운드 이미지 */
            body {
    background-image: url("https://i.pinimg.com/1200x/5e/b6/96/5eb696a8dded4141a036646a08edd6d6.jpg");
    background-position: top;    
       
   background-position: center; 
    background-attachment: fixed;
    background-size: cover
}
           
           
           
            /*ai사용*/
            /* 이미지 자체가 드래그의 주인공이 되지 않도록 설정 */
.item img {
    pointer-events: none; /* 이미지가 마우스 이벤트를 먹지 않게 함 */
    user-select: none;
}
/*ai사용*/
        </style>
    </head>

    <body>

        <header>
    <h1>4조 🎬 영화/드라마 티어 리스트</h1>
    <p>우리 조원들이 직접 선정한 10개 내외의 항목을 평가해 봅시다.</p>
        </header>
        
        

        <div class="layout-wrapper">
            <main class="tier-board">
                <div class="tier-row">
                    <div class="tier-label rank-s">S</div>
                    <div class="tier-items" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>
                <div class="tier-row">
                    <div class="tier-label rank-a">A</div>
                    <div class="tier-items" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>
                <div class="tier-row">
                    <div class="tier-label rank-b">B</div>
                    <div class="tier-items" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>
                <div class="tier-row">
                    <div class="tier-label rank-c">C</div>
                    <div class="tier-items" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>
                <div class="tier-row">
                    <div class="tier-label rank-d">D</div>
                    <div class="tier-items" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>
            </main>

            <aside class="side-panel">
                <div class="preview-box" id="previewBox">
                    <p class="preview-placeholder">아이템에 마우스를 올리면<br>상세 정보가 표시됩니다.</p>
                </div>

                <h2 style="font-size: 1.2rem; margin-bottom: 10px;color: white; text-shadow: 2px 2px 4px black; color: white;">📌 아이템 대기열</h2>
                <div class="item-pool" id="pool" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <!-- 조원들이 전달해준 아이템 코드를 여기에 붙여넣습니다. -->
                    <!--항목 이름 바꾸기-->

                    <!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김찬희_1">
                        <img src="https://i.pinimg.com/1200x/97/52/93/975293129787ac2af43294a022e16cc5.jpg" alt="극한직업">
                        <div class="item-name">극한직업</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김찬희_2">
                        <img src="https://i.pinimg.com/1200x/c9/ef/2d/c9ef2d638d9d20ccbb5857a7bface23b.jpg" alt="범죄도시">
                        <div class="item-name">범죄도시</div>
                    </div>
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김찬희_3">
                        <img src="https://i.pinimg.com/1200x/a0/4f/e4/a04fe4440f610c45093c28ee601a0f6f.jpg" alt="담보">
                        <div class="item-name">담보</div>
                    </div>
                    <!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김태양_1">
                        <img src="https://i.pinimg.com/736x/29/49/ab/2949ab14263b674b0797e387c0d8f6c8.jpg" alt="트루먼 쇼">
                        <div class="item-name">트루먼 쇼</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김태양_2">
                        <img src="https://i.pinimg.com/736x/cb/0b/5c/cb0b5c38e2b3527e6674c3bd4e008028.jpg" alt="해리포터">
                        <div class="item-name">해리포터</div>
                    </div>
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_김태양_3">
                        <img src="https://image.cine21.com/cine21/poster/2025/0617/11_35_04__6850d45821617.jpg" alt="라이언일병구하기">
                        <div class="item-name">라이언일병구하기</div>
                    </div>
                    <!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_윤혁진_1">
                        <img src="https://i.pinimg.com/736x/d4/83/14/d4831494b175c499e4ab5862b0c5a754.jpg"
                            alt="왕과 사는 남자">
                        <div class="item-name">왕과 사는 남자</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_윤혁진_2">
                        <img src="https://i.pinimg.com/1200x/3c/b4/28/3cb428f7b5e7246ee9c2727862e423e4.jpg" alt="어벤져스">
                        <div class="item-name">어벤져스</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_윤혁진_3">
                        <img src="https://i.pinimg.com/736x/0d/78/cc/0d78cc45edfb4e7148fe8abeadd7d57e.jpg"
                            alt="프로젝트 헤일메리">
                        <div class="item-name">프로젝트 헤일메리</div>
                    </div>
                    <!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_이상균_1">
                        <img src="https://i.pinimg.com/736x/94/b0/bc/94b0bc3c0608aef56b40d068dd494e98.jpg" alt="쥬라기공원">
                        <div class="item-name">쥬라기 공원</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_이상균_2">
                        <img src="https://i.pinimg.com/736x/56/af/3f/56af3f1e4815df4492cfcab601f2d524.jpg"
                            alt="7번방의 선물">
                        <div class="item-name">7번방의 선물</div>
                    </div>
                     <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_이상균_3">
                        <img src="https://i.pinimg.com/1200x/2c/7c/8f/2c7c8f9505f9e5d005abe8c3868a5fd0.jpg"
                            alt="너의 이름은">
                        <div class="item-name">너의 이름은</div>
                    </div>
                    <!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_조은성_1">
                        <img src="https://i.pinimg.com/736x/0d/2b/85/0d2b8514dd00f4e6981758142715156e.jpg" alt="원피스">
                        <div class="item-name">원피스</div>
                    </div>

                    <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_조은성_2">
                        <img src="https://i.pinimg.com/1200x/22/db/bf/22dbbf27e3c4a77042ac437480dce9b3.jpg" alt="나루토">
                        <div class="item-name">나루토</div>
                    </div>
                     <div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)"
                        id="item_조은성_3">
                        <img src="https://i.pinimg.com/736x/0e/6d/6c/0e6d6cbd5910a6f358d3db4e0e7e41ff.jpg" alt="블리치">
                        <div class="item-name">블리치</div>
                    </div>
                    <!-- 팀원 아이템 끝 -->

                </div>
            </aside>
        </div>

        <script>
              function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var draggedElement = document.getElementById(data);
            if (ev.target.classList.contains('tier-items') || ev.target.classList.contains('item-pool')) {
                ev.target.appendChild(draggedElement);
            } else if (ev.target.closest('.tier-items')) {
                ev.target.closest('.tier-items').appendChild(draggedElement);
            } else if (ev.target.closest('.item-pool')) {
                ev.target.closest('.item-pool').appendChild(draggedElement);
          }
        }
     

            // 아이템 미리보기 기능
            function showPreview(element) {
                var imgSrc = element.querySelector('img').src;
                var itemName = element.querySelector('.item-name').innerText;
                var preview = document.getElementById('previewBox');
                preview.innerHTML = '<img src="' + imgSrc + '" alt="미리보기 이미지"><p>' + itemName + '</p>';
            }

            
        </script>
    </body>

    </html>
